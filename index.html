<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak | Magical Greetings</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="stars"></div>
    <div class="twinkling"></div>
    <canvas id="fireworksCanvas"></canvas>
    
    <div class="lantern-container">
        <div class="lantern"></div>
        <div class="lantern"></div>
    </div>

    <main class="hero">
        <div class="moon"></div>
        
        <h1 class="glow-text">Eid Ul Fitr Mubarak 🌙</h1>
        <p class="sub-text">Wishing you a life full of happiness, peace, and prosperity.</p>

        <div class="input-group">
            <input type="text" id="userName" placeholder="His name who have sent you the link...">
            <button onclick="generateWish()" class="btn-primary">Open My Eid Wish</button>
        </div>

        <div class="audio-control">
            <button id="musicBtn" onclick="toggleMusic()">🎵 Play Soft Nasheed</button>
            <audio id="eidMusic" loop>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>
    </main>

    <div id="wishModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="card-art"></div>
            <h2 id="personalGreeting">Eid Mubarak!</h2>
            <p>"May the guidance and blessings of Allah be with you and your family always."</p>
            <div class="decoration">✨ 🌙 ✨</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
